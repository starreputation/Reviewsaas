<!DOCTYPE html>
<html>
<head>
<title>QR Generator</title>
</head>

<body>

<h2>QR Code Generator</h2>

<input id="url" placeholder="Enter URL">
<button onclick="gen()">Generate QR</button>

<br><br>

<img id="qr">

<script>
function gen(){
let url=document.getElementById("url").value
document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+url
}
</script>

</body>
</html>
